projects:
  - libvirt

gitlab:
  namespace: libvirt
  project: libvirt

targets:
  almalinux-9:
    jobs:
      - arch: x86_64
        builds: false
        variables:
          RPM: skip

      - arch: x86_64
        suffix: -clang
        variables:
          RPM: skip
          CC: clang

  almalinux-10:
    jobs:
      - arch: x86_64
        builds: false
        variables:
          RPM: skip

      - arch: x86_64
        suffix: -clang
        variables:
          RPM: skip
          CC: clang

  alpine-324: x86_64

  alpine-edge:
    jobs:
      - arch: x86_64
        allow-failure: true

  centos-stream-9:
    jobs:
      - arch: x86_64
        artifacts:
          expire_in: 1 day
          paths:
            - libvirt-rpms

  centos-stream-10:
    jobs:
      - arch: x86_64
        artifacts:
          expire_in: 1 day
          paths:
            - libvirt-rpms

  debian-13:
    jobs:
      - arch: x86_64

      - arch: x86_64
        suffix: -clang

      - arch: aarch64
        containers: false
        builds: false

      - arch: armv6l
        containers: false
        builds: false

      - arch: armv7l

      - arch: i686
        containers: false
        builds: false

      - arch: ppc64le
        containers: false
        builds: false

      - arch: riscv64
        containers: false
        builds: false

      - arch: s390x
        containers: false
        builds: false

  debian-sid:
    jobs:
      - arch: x86_64
        allow-failure: true

      - arch: aarch64
        containers: false
        builds: false

      - arch: armv6l
        containers: false
        builds: false

      - arch: armv7l
        containers: false
        builds: false

      - arch: i686
        containers: false
        builds: false

      - arch: ppc64le
        containers: false
        builds: false

      - arch: riscv64
        containers: false
        builds: false

      - arch: s390x
        containers: false
        builds: false

  fedora-43:
    jobs:
      - arch: x86_64
        artifacts:
          expire_in: 1 day
          paths:
            - libvirt-rpms

  fedora-44:
    jobs:
      - arch: x86_64
        artifacts:
          expire_in: 1 day
          paths:
            - libvirt-rpms

      - arch: mingw32
        builds: false

      - arch: mingw64

  fedora-rawhide:
    jobs:
      - arch: x86_64
        allow-failure: true

      - arch: x86_64
        suffix: -clang
        allow-failure: true
        variables:
          CC: clang
          RPM: skip

      - arch: mingw32
        allow-failure: true

      - arch: mingw64
        allow-failure: true
        builds: false

  opensuse-leap-16:
    jobs:
      - arch: x86_64
        variables:
          RPM: skip

  opensuse-tumbleweed:
    jobs:
      - arch: x86_64
        allow-failure: true
        variables:
          RPM: skip

  ubuntu-2404:
    jobs:
      - arch: x86_64

  ubuntu-2604:
    jobs:
      - arch: x86_64
        builds: false

      - arch: x86_64
        suffix: -clang
        variables:
          CC: clang
          MESON_ARGS: -Db_lundef=false -Db_sanitize=address,undefined
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
